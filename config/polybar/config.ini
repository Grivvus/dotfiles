[global/wm]
include-file = $HOME/.config/polybar/colors.ini
[colors]
background = ${colors.base}
background-alt = ${colors.surface0}
foreground = ${colors.text}
primary = ${colors.rosewater}
secondary = ${colors.lavender}
alert = ${colors.red}
disabled = ${colors.overlay0}

[bar/example]
width = 100%
height = 18pt
radius = 3

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Hack:size=13"
font-1 = "Font Awesome 7 Free:style=Solid:size=12"
font-2 = "Font Awesome 7 Free:style=Regular:size=12"
font-3 = "Font Awesome 7 Brands:style=Regular:size=12"

modules-left = xworkspaces 
modules-right = filesystem pulseaudio microphone xkeyboard memory temperature wlan eth date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#f5e0dc}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "vol "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/microphone]
type = custom/script
interval = 1
exec = ~/.config/polybar/microphone.sh
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "mem "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#f5e0dc}%ifname%%{F-} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#f5e0dc}%ifname%%{F-} %essid% %

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#f5e0dc}%ifname%%{F-}%

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S %d-%m-%Y
label = %date%
label-foreground = ${colors.primary}

[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px

[module/temperature]
type = internal/temperature
;; inconsistent every startup
; hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input
zone-type = x86_pkg_temp
base-temperature = 20
warn-temperature = 80

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
